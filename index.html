<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeshing for Fresh Fish</title>
    <link rel="stylesheet" href="style.css">
    <script src="bag.js" defer></script>
    <link rel="icon" type="image/png" href="Fish_1.png">
</head>
<header>
    <button class="open-btn" id="openInventory">
        Bag
    </button>
    <button class="" id="pondButton">
        Pond
    </button>
    <button class="" id="">
        Shop
    </button>

</header>
<body>
    <div id="toast"></div>
        <!-- MODAL -->
    <div class="modal" id="inventoryModal">

        <div class="modal-content">

            <div class="inventory-header">
                <div class="inventory-title">Inventory</div>
                <!-- If this isnt here the JScript throws off because it needs all of its constants all the time. -->
                <button class="close-btn" id="closeInventory">
                    ✕
                </button>
            </div>

            <div class="inventory-grid" id="inventoryGrid">
                <!-- Items generated by JavaScript -->
            </div>

        </div>

    </div>
    <div id="pond">
    </div>

</body>
<footer>

</footer>
