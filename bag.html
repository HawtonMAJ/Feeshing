<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Modal</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #1e1e1e;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* OPEN BUTTON */
    .open-btn {
        padding: 14px 28px;
        border: none;
        background: #4caf50;
        color: white;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .open-btn:hover {
        background: #45a049;
    }

    /* MODAL OVERLAY */
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);

        display: flex;
        justify-content: center;
        align-items: center;

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
    }

    .modal.active {
        opacity: 1;
        pointer-events: all;
    }

    /* MODAL CONTENT */
    .modal-content {
        width: 90%;
        max-width: 800px;
        background: #2b2b2b;
        border: 2px solid #444;
        border-radius: 12px;
        padding: 20px;
        position: relative;

        transform: scale(0.9);
        transition: transform 0.25s ease;
    }

    .modal.active .modal-content {
        transform: scale(1);
    }

    /* HEADER */
    .inventory-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .inventory-title {
        font-size: 28px;
        font-weight: bold;
    }

    .close-btn {
        background: crimson;
        border: none;
        color: white;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
    }

    /* INVENTORY GRID */
    .inventory-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 15px;
    }

    /* ITEM SLOT */
    .item-slot {
        background: #3a3a3a;
        border: 2px solid #555;
        border-radius: 10px;
        height: 120px;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        position: relative;
        transition: 0.2s ease;
        cursor: pointer;
    }

    .item-slot:hover {
        border-color: #4caf50;
        transform: translateY(-3px);
    }

    .item-icon {
        font-size: 40px;
        margin-bottom: 8px;
    }

    .item-name {
        font-size: 14px;
        text-align: center;
    }

    .item-count {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: #111;
        padding: 3px 7px;
        border-radius: 6px;
        font-size: 12px;
    }
</style>
</head>
<body>

<button class="open-btn" id="openInventory">
    Open Inventory
</button>

<!-- MODAL -->
<div class="modal" id="inventoryModal">

    <div class="modal-content">

        <div class="inventory-header">
            <div class="inventory-title">Inventory</div>

            <button class="close-btn" id="closeInventory">
                ✕
            </button>
        </div>

        <div class="inventory-grid" id="inventoryGrid">
            <!-- Items generated by JavaScript -->
        </div>

    </div>

</div>

<script>
    // SAMPLE INVENTORY DATA
    const inventoryItems = [
        { name: "Sword", icon: "⚔️", count: 1 },
        { name: "Potion", icon: "🧪", count: 5 },
        { name: "Shield", icon: "🛡️", count: 1 },
        { name: "Gold", icon: "💰", count: 250 },
        { name: "Bow", icon: "🏹", count: 1 },
        { name: "Apple", icon: "🍎", count: 12 },
        { name: "Gem", icon: "💎", count: 3 },
        { name: "Map", icon: "🗺️", count: 1 }
    ];

    // ELEMENTS
    const modal = document.getElementById("inventoryModal");
    const openBtn = document.getElementById("openInventory");
    const closeBtn = document.getElementById("closeInventory");
    const inventoryGrid = document.getElementById("inventoryGrid");

    // OPEN MODAL
    openBtn.addEventListener("click", () => {
        modal.classList.add("active");
    });

    // CLOSE MODAL
    closeBtn.addEventListener("click", () => {
        modal.classList.remove("active");
    });

    // CLOSE WHEN CLICKING OUTSIDE
    modal.addEventListener("click", (e) => {
        if (e.target === modal) {
            modal.classList.remove("active");
        }
    });

    // ESC KEY CLOSE
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
            modal.classList.remove("active");
        }
    });

    // RENDER INVENTORY
    function renderInventory() {
        inventoryGrid.innerHTML = "";

        inventoryItems.forEach(item => {

            const slot = document.createElement("div");
            slot.classList.add("item-slot");

            slot.innerHTML = `
                <div class="item-icon">${item.icon}</div>
                <div class="item-name">${item.name}</div>
                <div class="item-count">${item.count}</div>
            `;

            slot.addEventListener("click", () => {
                alert(`You clicked ${item.name}`);
            });

            inventoryGrid.appendChild(slot);
        });
    }

    renderInventory();
</script>

</body>
</html>
